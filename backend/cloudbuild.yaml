# Google Cloud Build configuration for Cathode API
steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cathode-api:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/cathode-api:latest'
      - '.'

  # Push the Docker image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/cathode-api:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/cathode-api:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'cathode-api'
      - '--image=gcr.io/$PROJECT_ID/cathode-api:$BUILD_ID'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8000'
      - '--memory=4Gi'
      - '--cpu=2'
      - '--max-instances=10'
      - '--timeout=300'
      - '--set-env-vars=TOKENIZERS_PARALLELISM=false'

# Store images in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/cathode-api:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/cathode-api:latest'

# Build configuration
options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
