description: >
  This file is a schema for the Cathode frontend (cathode-frontend/). It gives AI agents an overview
  of the project and its files to make prompting easier. Cathode is a React SPA that lets users
  describe a life experience, select genre filters, and receive a cathartic playlist generated by
  the backend hybrid search pipeline. The frontend polls async jobs on the FastAPI backend at
  localhost:8000. Playlists are stored in React component state only (no persistence, no auth).
  Deployed via Firebase Hosting. If you are an AI agent making changes to files, please update
  this schema if changes are significant enough to be mentioned here.

stack:
  type: concept
  description: >
    React 19 + Vite 7, Tailwind CSS 4, Blueprint.js 6, Firebase Hosting (SPA rewrites). No
    react-router, no global store (Redux/Zustand), no auth. Manual string-based routing in App.jsx.

routing:
  type: concept
  description: >
    Page state managed in App.jsx as page string: 'home' | 'new' | 'results' | 'about'. No URL-based
    routing — refreshing the page resets all state.

api_integration:
  type: concept
  description: >
    All backend communication lives in hooks/useJobPolling.js. API_BASE_URL is hardcoded to
    http://localhost:8000 (also duplicated in utils/helpers.js but hooks do not import helpers).
  endpoints:
    - "POST /api/playlist — body: { prompt, filters: { genres, exploration } }, returns { job_id, initial_song_count }"
    - "GET /api/job/:jobId — poll status until completed/failed/cancelled"
    - "DELETE /api/job/:jobId — cancel running job"

domain_model:
  type: concept
  description: In-memory data shapes used across pages and components.
  children:
    Playlist:
      type: concept
      description: >
        { id, title, songs: Song[], genres?: string[] }. Created from job result in
        NewPlaylistFlow → App.handleCreated. Title often derived from prompt (truncated to 50 chars).
    Song:
      type: concept
      description: >
        { id, title, artist, duration_ms, score, album, streams, image_url, url }. Rendered by
        SongCard. url is Spotify track link.
    Filters:
      type: concept
      description: >
        { genres: string[], exploration: number (0-10) }. Default exploration=3. Genres are display
        labels: Pop, Rap, R&B, Rock, Country, Misc.

creation_flow:
  type: concept
  description: End-to-end playlist creation user flow.
  children:
    step_1:
      type: concept
      description: Step1DescribeExperience — user writes free-text experience prompt.
    step_2:
      type: concept
      description: Step2SelectFilters — genre multi-select + exploration slider, then POST /api/playlist.
    step_3:
      type: concept
      description: >
        Step3Progress — useJobPolling polls every 3s (10 min timeout). On complete → onCreated(result).
        On fail/timeout → alert + back to step 2. Home button warns and cancels job via DELETE.
    results:
      type: concept
      description: >
        ResultsView — editable title, expandable SongCard list. Spotify export and playlist export
        are TODO stubs (console.log only).

package.json:
  type: file
  description: >
    Project metadata. Scripts: dev, build, lint, preview. Key deps: react, react-dom,
    @blueprintjs/core, @blueprintjs/icons. Dev deps: Vite, ESLint, Tailwind 4, PostCSS.
  dependencies:
    - react, react-dom
    - "@blueprintjs/core, @blueprintjs/icons"
    - blueprintjs (legacy meta-package)

vite.config.js:
  type: file
  description: Minimal Vite config with @vitejs/plugin-react only. No proxy, no path aliases.

tailwind.config.js:
  type: file
  description: Tailwind theme extension. Imports theme from src/utils/theme.js. Extends colors background, text-dark, button.

postcss.config.js:
  type: file
  description: PostCSS pipeline with @tailwindcss/postcss + autoprefixer.

eslint.config.js:
  type: file
  description: ESLint flat config for JS/JSX with React Hooks + React Refresh plugins.

index.html:
  type: file
  description: SPA shell. Favicon /Icon-Logo-nobg.png. Mounts #root via /src/main.jsx.

firebase.json:
  type: file
  description: Firebase Hosting config. Serves dist/, SPA rewrite ** → /index.html.

.firebaserc:
  type: file
  description: Firebase project configuration.

src:
  type: folder
  description: Application source code.
  children:
    main.jsx:
      type: file
      description: React bootstrap. Imports index.css, renders StrictMode > App into #root.
    App.jsx:
      type: file
      description: >
        Root app shell and global state/router. State: page, playlists[], activePlaylist. Functions:
        openNew, openAbout, openHome, openSettings (unused), handleCancelNew, handleCreated,
        openPlaylist, handleTitleChange. Conditionally renders Home, NewPlaylistFlow, ResultsView,
        About based on page state.
    App.css:
      type: file
      description: Leftover Vite boilerplate (.card, .read-the-docs). Not imported anywhere.
    index.css:
      type: file
      description: >
        Global styles. Blueprint CSS imports, Tailwind directives, CSS variables (--color-background,
        --color-text-dark, --color-button). Note: --color-button is #3ab8f8 here but theme.js uses
        #008888.

    pages:
      type: folder
      description: Top-level page components, one per App.jsx route.
      children:
        Home.jsx:
          type: file
          description: >
            Landing page listing in-memory playlists. Props: playlists, onNew, onOpenPlaylist,
            onHome, onAbout. UI: Logo, Generate Playlist button, PlaylistCard grid, BottomBar.
          dependencies:
            - NewButton, PlaylistCard, Logo, CustomBr, BottomBar, styles/home.css
        NewPlaylistFlow.jsx:
          type: file
          description: >
            3-step wizard orchestrator. State: step (1-3), prompt, filters, jobId, initialSongCount.
            Hooks: useCreatePlaylist(), useJobPolling(jobId). handleCreate() POSTs playlist and sets
            jobId. Effects handle job complete/fail/timeout/cancel transitions.
          dependencies:
            - Step1DescribeExperience, Step2SelectFilters, Step3Progress, useJobPolling.js
        Step1DescribeExperience.jsx:
          type: file
          description: >
            Step 1 — free-text experience prompt. Local error state for validation. handleNext()
            requires non-empty prompt. Blueprint TextArea, Cancel/Next buttons, StepHeader, BottomBar.
          props:
            - prompt, setPrompt, onCancel, onNext, onHome, onAbout
        Step2SelectFilters.jsx:
          type: file
          description: >
            Step 2 — genre multi-select and exploration slider (0-10). Genres: Pop, Rap, R&B, Rock,
            Country, Misc + All (clears selection). Dead code: externalToInternal map, genres array,
            toggleGenre — defined but unused.
          props:
            - filters, setFilters, onBack, onCreatePlaylist, onCancel, onHome, onAbout
        Step3Progress.jsx:
          type: file
          description: >
            Step 3 — progress UI while backend job runs. Rotating puns, currentSongCount parsed
            from backend messages, searchStats, simulated searchedSongs counter. handleHomeWarning()
            confirms then cancels job via DELETE. Blueprint ProgressBar.
          props:
            - progress, message, status, jobId, initialSongCount, cancelJob, onBack, onCancel, onHome, onAbout
        ResultsView.jsx:
          type: file
          description: >
            Completed playlist display. Editable title (Blueprint EditableText), SongCard list,
            sticky bottom bar with Spotify button. Alert warns data won't persist on home navigation.
            handleExport and handleSpotifyOpen are TODO stubs.
          props:
            - playlist, onBack, onTitleChange, onHome, onAbout
        About.jsx:
          type: file
          description: >
            Static about/credits page explaining Cathode's pipeline. External links to Kaggle lyrics
            DB, LinkedIn, GitHub. StepHeader, CustomBr, BottomBar.
          props:
            - onBack
        styles:
          type: folder
          description: Page-scoped CSS files.
          children:
            home.css:
              type: file
              description: Full-viewport .container, scrollable .playlists-container.
            steps.css:
              type: file
              description: Aggregator importing step sub-styles.
            step-layout.css:
              type: file
              description: Top/middle section layout for wizard pages.
            step-animations.css:
              type: file
              description: Logo trails, step number animations.
            step-progress.css:
              type: file
              description: Large progress bar, pun rotation animations.
            step-filters.css:
              type: file
              description: Genre button group, All button styling.
            step-responsive.css:
              type: file
              description: Mobile breakpoints.
            results.css:
              type: file
              description: Results page layout, title bar, bottom bar.

    components:
      type: folder
      description: Reusable UI components shared across pages.
      children:
        NewButton.jsx:
          type: file
          description: Large CTA to start playlist generation. Blueprint Add icon + "Generate Playlist".
          props:
            - onClick
          css:
            - NewButton.css
        PlaylistCard.jsx:
          type: file
          description: >
            Clickable card for a saved playlist on Home. formatGenres() shows up to 3 genres or
            "Various Genres". Note: console.log(p) left in production code.
          props:
            - "p: { id, title, songs[], genres? }, onOpen, skeleton"
          css:
            - PlaylistCard.css
        SongCard.jsx:
          type: file
          description: >
            Expandable song row in results. Opens s.url (Spotify) in new tab. Uses formatDuration
            from utils/helpers.
          props:
            - "s: { id, title, artist, duration_ms, score, album, streams, image_url, url }, skeleton"
          css:
            - SongCard.css
        Logo.jsx:
          type: file
          description: >
            Animated Cathode logo. Props: small, text, animated (default true). Assets:
            Icon-Logo-nobg.png, Text-Logo-nobg.png from src/assets/.
          css:
            - Logo.css
        StepHeader.jsx:
          type: file
          description: >
            Shared header for wizard/about pages. Logo, step number, title, subtitle, home icon.
            Hides logo/home icon on mobile via isMobile().
          props:
            - stepNumber, title, subtitle, onCancel
          css:
            - imports pages/styles/steps.css
        ResultsHeader.jsx:
          type: file
          description: >
            Results page header — "Your Playlist is Ready!" with music emoji. onExport prop
            accepted but not wired in JSX.
          props:
            - playlist, onBack, onExport
        BottomBar.jsx:
          type: file
          description: >
            Fixed bottom nav with Home and About buttons. If onHomeWarning provided (Step 3),
            intercepts Home click for confirmation. Logo imported but unused.
          props:
            - onHome, onAbout, onHomeWarning
          css:
            - BottomBar.css
        CustomBr.jsx:
          type: file
          description: Visual spacer/divider element.
          css:
            - CustomBr.css
        Icons.jsx:
          type: file
          description: Custom SVG icons (IconSettings, IconSpotify). Not imported anywhere in codebase.

    hooks:
      type: folder
      description: Custom React hooks.
      children:
        useJobPolling.js:
          type: file
          description: >
            All backend communication for async playlist jobs. API_BASE_URL = http://localhost:8000.
          exports:
            - JOB_STATUS enum (pending, in_progress, completed, failed, cancelled)
            - useJobPolling(jobId, options?) — polls GET /api/job/:jobId every 3s, 10 min timeout.
              Returns progress, status, message, result, error, hasTimedOut, cancelJob, polling controls.
            - useCreatePlaylist() — POST /api/playlist with { prompt, filters }. Returns jobId,
              initialSongCount, isCreating, error.
          used_by:
            - NewPlaylistFlow.jsx

    utils:
      type: folder
      description: Shared utility functions and constants.
      children:
        helpers.js:
          type: file
          description: >
            formatDuration(ms) → m:ss string. isMobile() → UA + touch/width heuristic. API URL
            constants (API_BASE_URL, API_CREATE_PLAYLIST, API_GET_JOB_STATUS, API_GET_PLAYLIST) —
            duplicated/unused by hooks.
          exports:
            - formatDuration, isMobile, API_BASE_URL, API_CREATE_PLAYLIST, API_GET_JOB_STATUS, API_GET_PLAYLIST
          used_by:
            - SongCard (formatDuration), StepHeader/ResultsHeader (isMobile)
        theme.js:
          type: file
          description: >
            Color tokens for Tailwind. background: #f6ffaf, textDark: #161616, button: #008888.
          used_by:
            - tailwind.config.js

    assets:
      type: folder
      description: Static image assets.
      children:
        flowchart.15fed92e--2-.svg:
          type: file
          description: Flowchart image. Unreferenced in JS/JSX.
        Icon-Logo-nobg.png:
          type: file
          description: Icon logo. Imported by Logo.jsx. May need to exist at build time.
        Text-Logo-nobg.png:
          type: file
          description: Text logo. Imported by Logo.jsx.
        Spotify-Icon.png:
          type: file
          description: Spotify icon. Referenced by SongCard.jsx.

dependency_graph:
  type: concept
  description: Key file dependency relationships.
  children:
    App.jsx:
      type: concept
      description: >
        App → Home (NewButton, PlaylistCard, Logo, CustomBr, BottomBar) | NewPlaylistFlow
        (useJobPolling → localhost:8000, Step1/2/3) | ResultsView (SongCard, ResultsHeader,
        BottomBar) | About (StepHeader, CustomBr, BottomBar)
    shared:
      type: concept
      description: >
        StepHeader, ResultsHeader → Logo, helpers.isMobile. SongCard → helpers.formatDuration.
        BottomBar → Blueprint Button.

dead_code_and_gaps:
  type: concept
  description: Known incomplete or unused code an agent should be aware of.
  children:
    openSettings:
      type: concept
      description: Defined in App.jsx, never called.
    Icons.jsx:
      type: concept
      description: Never imported.
    App.css:
      type: concept
      description: Never imported.
    helpers_api_constants:
      type: concept
      description: Duplicated in useJobPolling.js; hooks don't use helpers.
    Step2_dead_code:
      type: concept
      description: externalToInternal, toggleGenre, genres array in Step2SelectFilters — unused.
    ResultsHeader_onExport:
      type: concept
      description: Prop accepted but not wired.
    BottomBar_Logo_import:
      type: concept
      description: Logo imported but unused.
    export_stubs:
      type: concept
      description: Spotify export / playlist export in ResultsView are TODO (console.log).
    no_persistence:
      type: concept
      description: Playlists lost on tab close. Alert warns user on navigation.
    no_router:
      type: concept
      description: react-router not used. No URL-based deep linking.
    api_url_hardcoded:
      type: concept
      description: localhost:8000 hardcoded in hooks and helpers. No env-based config for production API URL.
    theme_color_mismatch:
      type: concept
      description: index.css --color-button (#3ab8f8) differs from theme.js button (#008888).

deploy:
  type: concept
  description: "vite build → dist/ → Firebase Hosting (firebase.json SPA rewrites)."
